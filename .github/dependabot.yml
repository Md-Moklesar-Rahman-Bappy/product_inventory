version: 2
updates:
  # Composer (PHP / Laravel)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(composer)"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "symfony/*"
        versions: ["< 6.0.0"]
    versioning-strategy: increase

  # npm (Node / Vite / Tailwind)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(npm)"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10

  # GitHub Actions (workflow updates)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(actions)"
    labels:
      - "ci"
      - "dependencies"
